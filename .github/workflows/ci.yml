name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.11"

      - name: Sync test-server dependencies
        working-directory: test-server
        run: uv sync

      - name: Run tests (unit + E2E)
        env:
          MCP_E2E_IT: "1"
          MCP_OAUTH_IT: "1"
        run: ./gradlew test

      - name: Build fat JAR
        run: ./gradlew shadowJar

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: build/reports/tests/**
          retention-days: 7

      - name: Upload fat JAR
        uses: actions/upload-artifact@v7
        with:
          name: mcp-server-scanner-extension-jar
          path: build/libs/*-all.jar
          retention-days: 7
